# Mantém os projetos Supabase ativos (evita pausa por inatividade no plano gratuito).
# Lista: .github/supabase-keepalive-projects.json
# Se o workflow agendado parar de rodar, confira em Actions se o GitHub desativou por
# inatividade do repositório (~60 dias sem commit). O workflow "Manter repositório ativo"
# gera um commit mensal para evitar isso.

name: Supabase keep-alive

on:
  schedule:
    - cron: "0 8,20 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase (todos os projetos)
        run: |
          set -euo pipefail
          CONFIG=".github/supabase-keepalive-projects.json"
          if [ ! -f "$CONFIG" ]; then
            echo "::error::Arquivo $CONFIG não encontrado."
            exit 1
          fi
          COUNT=$(jq length "$CONFIG")
          echo "Encontrados $COUNT projeto(s)."
          FAILED=0
          for i in $(seq 0 $((COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" "$CONFIG")
            URL=$(jq -r ".[$i].url" "$CONFIG")
            KEY=$(jq -r ".[$i].anonKey" "$CONFIG")
            if [ "$URL" = "null" ] || [ -z "$URL" ] || [[ "$URL" == COLE_* ]]; then
              echo "[$NAME] Ignorado (URL não configurado)."
              continue
            fi
            OK=0
            CODE=$(curl -sS -o /tmp/ka_body.txt -w "%{http_code}" --connect-timeout 15 --max-time 45 \
              -H "Accept: application/json" "$URL/auth/v1/health" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "[$NAME] OK (auth health)."
              OK=1
            fi
            if [ "$OK" -eq 0 ] && [ "$KEY" != "null" ] && [ -n "$KEY" ] && [[ "$KEY" != COLE_* ]]; then
              CODE=$(curl -sS -o /tmp/ka_body.txt -w "%{http_code}" --connect-timeout 15 --max-time 45 \
                -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
                -H "Accept: application/json" \
                "${URL%/}/rest/v1/" 2>/dev/null || echo "000")
              if [ "$CODE" != "000" ] && [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
                echo "[$NAME] OK (REST)."
                OK=1
              fi
            fi
            if [ "$OK" -eq 0 ] && [ "$KEY" != "null" ] && [ -n "$KEY" ] && [[ "$KEY" != COLE_* ]]; then
              CODE=$(curl -sS -o /tmp/ka_body.txt -w "%{http_code}" --connect-timeout 15 --max-time 45 -X OPTIONS \
                -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
                "${URL%/}/rest/v1/" 2>/dev/null || echo "000")
              if [ "$CODE" = "200" ] || [ "$CODE" = "204" ]; then
                echo "[$NAME] OK (REST OPTIONS)."
                OK=1
              fi
            fi
            if [ "$OK" -eq 0 ]; then
              CODE=$(curl -sS -o /tmp/ka_body.txt -w "%{http_code}" --connect-timeout 15 --max-time 45 \
                "${URL%/}/" 2>/dev/null || echo "000")
              if [ "$CODE" = "000" ]; then
                echo "::error::[$NAME] Sem resposta (projeto pausado, DNS ou rede)."
                FAILED=$((FAILED + 1))
              elif [ "$CODE" -ge 200 ] && [ "$CODE" -lt 400 ]; then
                echo "[$NAME] OK (raiz HTTP $CODE)."
              elif [ "$CODE" -eq 503 ] || [ "$CODE" -eq 502 ]; then
                echo "::error::[$NAME] Indisponível (HTTP $CODE). Projeto pode estar pausado."
                FAILED=$((FAILED + 1))
              else
                echo "::warning::[$NAME] Resposta inesperada HTTP $CODE (verifique URL/chave)."
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED projeto(s) não responderam como esperado."
            exit 1
          fi
          echo "Concluído: $COUNT projeto(s) verificado(s) com sucesso."
