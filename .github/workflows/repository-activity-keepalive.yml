# O GitHub pode desativar workflows com "schedule" se o repositório ficar ~60 dias sem
# atividade (commits). Este job roda 1x por mês e grava um timestamp para manter o repo "ativo".

name: Manter repositório ativo

on:
  schedule:
    - cron: "15 7 3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Registrar data UTC
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-repo-activity.txt
      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-repo-activity.txt
          if git diff --staged --quiet; then
            echo "Nada a commitar."
            exit 0
          fi
          git commit -m "chore: keepalive do repositório (mantém Actions agendadas habilitadas)"
          git push
